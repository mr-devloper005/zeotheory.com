name: Promote Dev To Main PR

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse dev to main PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          ahead_by="$(gh api "repos/${GITHUB_REPOSITORY}/compare/main...dev" --jq '.ahead_by')"
          if [[ "$ahead_by" == "0" ]]; then
            echo "No commits waiting between dev and main."
            exit 0
          fi

          existing_pr="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            echo "Promotion PR already open: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --base main \
            --head dev \
            --title "Promote dev to main" \
            --body "Auto-created promotion PR after successful merge to dev."
