name: Auto Merge Safe UI PRs

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  enable-auto-merge:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PR only touches editable surface
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr diff "$PR_NUMBER" --name-only > changed-files.txt
          disallowed=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              src/editable/*|src/editable/**) ;;
              *) echo "Blocked auto-merge: non-editable file changed: $file"; disallowed=1 ;;
            esac
          done < changed-files.txt
          exit "$disallowed"

      - name: Enable auto-merge after required checks pass
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
